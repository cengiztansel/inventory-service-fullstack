services:
  # 1. Veritabanı
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: St716944
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Spring Boot Backend
  backend:
    build: ./inventory-service   # Dockerfile'ı bu klasörde ara
    container_name: inventory-backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: St716944
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  # 3. React Frontend (Nginx ile)
  frontend:
    build: ./inventory-frontend  # Dockerfile'ı bu klasörde ara
    container_name: inventory-frontend
    ports:
      - "3000:80"                # Nginx'in 80 portunu dışarı 3000 olarak aç
    depends_on:
      - backend
